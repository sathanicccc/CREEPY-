<!DOCTYPE html>
<html lang="en">

    <style>
        body { 
            margin: 0; padding: 0; background-color: black; color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        
        /* Scary Background GIF */
        .bg-gif {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; display: block;
        }

        /* Hacking Interface Box */
        .overlay {
            position: relative; z-index: 2; text-align: center;
            background: rgba(0, 0, 0, 0.85); padding: 25px; border: 2px solid red;
            width: 85%; border-radius: 10px; box-shadow: 0 0 20px red;
        }

        h1 { color: red; font-size: 1.8rem; text-shadow: 0 0 10px red; animation: blink 0.1s infinite; margin-bottom: 10px; }
        .details { font-size: 0.95rem; line-height: 1.6; text-align: left; color: #00ff00; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Full Screen Click Trigger */
        #click-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(0,0,0,0.5); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        .tap-text { color: white; font-size: 1.2rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="click-trigger" onclick="activateSathan()">
        <p class="tap-text">TAP TO START SYSTEM SCAN</p>
    </div>

    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJid3Z6bmZqZ3RreXp4Z3RreXp4Z3RreXp4Z3RreXp4Z3RreSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKv9Q2YPFyi5YYM/giphy.gif" class="bg-gif">

            <p>> STATUS: <span style="color:red; font-weight:bold;">BYE BYE.</span></p>

        </div>
    </div>

    <audio id="horrorAudio" loop>
        <source src="dragon-studio-scary-riser-432997.mp3" type="audio/mpeg">
    </audio>

    <script>
        // No Escape Logic (Back button disable prank)
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        function activateSathan() {
            var audio = document.getElementById("horrorAudio");
            
            // Play Your Custom Scary Riser
            audio.play().catch(e => console.log("Sound error: " + e));

            // Go Fullscreen
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }

            // Hide the trigger overlay
            document.getElementById('click-trigger').style.display = 'none';

            // Vanish hacking box after 7 seconds for pure jumpscare
            setTimeout(function() {
                document.getElementById('main-box').style.opacity = '0';
                document.getElementById('main-box').style.transition = 'opacity 1.5s';
                setTimeout(() => { document.getElementById('main-box').style.display = 'none'; }, 1500);
            }, 7000);
        }

        // Disable Long Press / Right Click
        window.oncontextmenu = function() { return false; }
    </script>
</body>
</html>
