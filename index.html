<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Security Check</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f1f1f1; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; height: 100vh; }

        /* Fake Chrome/Google Interface */
        #fake-interface { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 500; display: flex; flex-direction: column; }
        .address-bar { background-color: #f1f1f1; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #dcdcdc; }
        .search-box { background: white; border-radius: 20px; padding: 8px 15px; width: 85%; margin-left: 10px; color: #5f6368; font-size: 14px; border: 1px solid #dfe1e5; }
        .google-logo { text-align: center; margin-top: 100px; font-size: 48px; font-weight: bold; letter-spacing: -2px; }
        .g-blue { color: #4285F4; } .g-red { color: #EA4335; } .g-yellow { color: #FBBC05; } .g-green { color: #34A853; }
        .btn-scan { background: #1a73e8; color: white; border: none; padding: 12px 30px; border-radius: 4px; margin-top: 40px; font-weight: 500; cursor: pointer; font-size: 15px; }

        /* The Horror Prank Screen */
        #prank-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; display: none; }
        
        /* Fast Data/Contact Streaming Background */
        #data-stream { position: absolute; width: 100%; height: 100%; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; opacity: 0.5; pointer-events: none; }
        .log-line { white-space: nowrap; animation: scrollUp 0.1s linear infinite; padding-left: 10px; }
        @keyframes scrollUp { from { transform: translateY(100vh); } to { transform: translateY(-100vh); } }

        /* Hacking UI */
        .horror-overlay { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 150; }
        .status-box { background: rgba(0,0,0,0.9); border: 2px solid red; padding: 25px; text-align: center; color: white; width: 85%; box-shadow: 0 0 40px red; }
        
        .warn-text { color: red; font-size: 1.6rem; font-weight: bold; animation: glitch-blink 0.1s infinite; }
        @keyframes glitch-blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }

        .money-log { color: #ffcc00; font-weight: bold; margin-top: 15px; font-size: 1rem; border-top: 1px solid #333; padding-top: 10px; }
        
        /* Extreme Glitch Filter */
        .glitch-active { animation: extreme-shake 0.05s infinite; filter: invert(100%) contrast(300%); }
        @keyframes extreme-shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(0, 0); } }
    </style>
</head>
<body>

    <div id="fake-interface">
        <div class="address-bar"><div class="search-box">google.com/security-scan</div></div>
        <div class="google-logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>
        <div style="text-align: center;">
            <p style="color: #5f6368; margin-top: 15px;">System Vulnerability Detected</p>
            <button class="btn-scan" onclick="launchPrank()">SCAN DEVICE</button>
        </div>
    </div>

    <div id="prank-screen">
        <div id="data-stream"></div>
        <div class="horror-overlay">
            <div class="status-box" id="glitch-target">
                <div class="warn-text">SYSTEM HIJACKED</div>
                <div style="margin-top: 15px; color: #0f0; text-align: left; font-family: monospace; font-size: 0.8rem;">
                    > ACCESSING POCO M4 PRO CHIPSET...<br>
                    > CLONING WHATSAPP DATABASE...<br>
                    > UPLOADING DCIM/CAMERA TO SERVER...
                </div>
                <div class="money-log" id="bank-status">TRANSFERRING ₹65,000...</div>
                <div style="font-size: 2.5rem; color: red; margin-top: 15px;" id="p-count">0%</div>
            </div>
        </div>
    </div>

    <audio id="riserAudio" loop><source src="dragon-studio-scary-riser-432997.mp3" type="audio/mpeg"></audio>

    <script>
        const names = ["Rahul", "Anjali", "Midhun", "Sneha", "Jithin", "Fahad", "Sinu", "Meera", "Abhi", "Arun"];
        const bankAlerts = ["UPI PIN BYPASSED", "SBI ACCOUNT LINKED", "HDFC BALANCE: 0.00", "GOOGLE PAY HIJACKED", "SENDING TO UNKNOWN WALLET"];

        function launchPrank() {
            // Start Prank
            document.getElementById('fake-interface').style.display = 'none';
            document.getElementById('prank-screen').style.display = 'block';
            document.getElementById('riserAudio').play().catch(e => console.log("Sound error"));

            // Go Fullscreen
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            // Glitch Effect after 4 seconds
            setTimeout(() => {
                document.getElementById('glitch-target').classList.add('glitch-active');
            }, 4000);

            // Background Data Stream
            setInterval(makeStream, 50);

            // Progress & Bank Log Update
            let count = 0;
            const timer = setInterval(() => {
                count++;
                document.getElementById('p-count').innerText = count + "%";
                if(count % 20 === 0) {
                    document.getElementById('bank-status').innerText = bankAlerts[Math.floor(Math.random() * bankAlerts.length)];
                }
                if(count >= 100) {
                    clearInterval(timer);
                    document.getElementById('p-count').innerText = "DONE";
                }
            }, 120);
        }

        function makeStream() {
            const stream = document.getElementById('data-stream');
            const line = document.createElement('div');
            line.className = 'log-line';
            const randomName = names[Math.floor(Math.random() * names.length)];
            const randomNum = "91" + Math.floor(7000000000 + Math.random() * 2999999999);
            line.innerText = `[SCANNED] CONTACT: ${randomName} (${randomNum}) | FILE: DCIM/IMG_${Math.floor(Math.random()*9999)}.jpg [SENT]`;
            stream.appendChild(line);
            if(stream.childNodes.length > 50) stream.removeChild(stream.firstChild);
        }

        // Lock Back Button
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
    </script>
</body>
</html>
