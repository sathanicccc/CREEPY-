<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathanic_webviwe_Os</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: black; 
            color: #00ff00; /* Matrix Green */
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Creepy Background GIF */
        .bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.8;
        }

        /* Hacking Text Overlay */
        .overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 2px solid red;
        }

        h1 {
            color: red;
            font-size: 2.5rem;
            text-shadow: 0 0 10px red;
            animation: blink 0.1s infinite;
        }

        .details {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        /* Red Alert Effect */
        .glitch-red {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.1);
            z-index: 3;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body onclick="startPrank()">

    <img src="https://media.tenor.com/7YjXw-lR0l4AAAAC/spooky%27s-jumpscare-mansion-ringu.gif" class="bg-gif">

    <div class="glitch-red" id="glitch"></div>

    <div class="overlay" id="main-box">
        <h1>SATHAN HACKED YOUR DEVICE</h1>
        <div class="details">
            <p>> Accessing Device Chipset...</p>
            <p>> Exporting Gallery: 1422 Photos...</p>
            <p>> Sharing Contacts to DeepWeb...</p>
            <p style="color: white; font-weight: bold;">I WILL SEE YOU SOON.</p>
        </div>
    </div>

    <audio id="scarySound" loop>
        <source src="https://www.soundboard.com/handler/Downloadaudio.ashx?id=612177" type="audio/mpeg">
    </audio>

    <script>
        // No Escape Logic
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        function startPrank() {
            // Play Sound
            var audio = document.getElementById("scarySound");
            audio.play();

            // Fullscreen trigger
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Show Red Glitch
            document.getElementById('glitch').style.display = 'block';

            // Vanish text after 10 seconds
            setTimeout(function() {
                document.getElementById('main-box').style.opacity = '0';
                document.getElementById('main-box').style.transition = 'opacity 2s';
            }, 10000);
        }

        // Prevent Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
